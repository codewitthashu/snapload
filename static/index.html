<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapLoad - Instagram & YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .auth-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .auth-section button {
            margin-top: 0;
            background: #f0f0f0;
            color: #333;
        }
        
        .auth-section button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .auth-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .user-info {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .user-info.show {
            display: block;
        }
        
        .credits {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .preview {
            margin-top: 20px;
            display: none;
        }
        
        .preview.show {
            display: block;
        }
        
        .preview img {
            max-width: 100%;
            border-radius: 8px;
        }
        
        .download-link {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        
        .download-link.show {
            display: block;
        }
        
        .download-link a {
            display: inline-block;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .buy-credits {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            text-align: center;
        }
        
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .price-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: all 0.3s;
        }
        
        .price-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .price-card h3 {
            margin-bottom: 5px;
            color: #333;
        }
        
        .price-card p {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }
        
        .price-card .popular {
            background: #ffd700;
            color: #333;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 5px;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        footer a {
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📥 SnapLoad</h1>
        <p class="subtitle">Download Instagram Reels & YouTube Videos</p>
        
        <!-- User Info Section -->
        <div class="user-info" id="userInfo">
            <div>👋 Welcome, <span id="userName">User</span>!</div>
            <div class="credits">🎫 <span id="userCredits">0</span> credits remaining</div>
            <button onclick="logout()" style="background: rgba(255,255,255,0.2); margin-top: 10px;">Logout</button>
        </div>
        
        <!-- Auth Section -->
        <div id="authSection">
            <div class="auth-section">
                <button id="loginTabBtn" class="active" onclick="showAuthTab('login')">Login</button>
                <button id="signupTabBtn" onclick="showAuthTab('signup')">Sign Up (2 Free Credits)</button>
            </div>
            
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
            
            <div id="signupForm" class="auth-form">
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password">
                <button onclick="signup()">Create Account (Get 2 Free Credits)</button>
            </div>
        </div>
        
        <!-- Download Section -->
        <div id="downloadSection" style="display: none;">
            <input type="url" id="urlInput" placeholder="Paste Instagram Reel or YouTube URL here...">
            
            <div style="display: flex; gap: 10px; margin: 10px 0;">
                <select id="formatSelect" style="flex:1">
                    <option value="mp4">📹 MP4 (Video)</option>
                    <option value="mp3">🎵 MP3 (Audio)</option>
                </select>
                <select id="qualitySelect" style="flex:1">
                    <option value="best">Best Quality</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                </select>
            </div>
            
            <button onclick="startDownload()">⬇ Download (1 credit)</button>
            
            <div class="status" id="status"></div>
            
            <div class="preview" id="preview">
                <img id="previewThumb" src="" alt="">
                <h4 id="previewTitle"></h4>
                <p id="previewMeta"></p>
            </div>
            
            <div class="download-link" id="downloadLink">
                <a href="#" id="downloadAnchor" download>💾 Save File</a>
            </div>
            
            <div class="buy-credits" id="buyCredits">
                <h3>💰 Need More Credits?</h3>
                <div class="price-grid" id="priceGrid"></div>
                <p style="margin-top: 10px; font-size: 12px; color: #666;">Credits never expire. UPI, Card, NetBanking accepted.</p>
            </div>
        </div>
    </div>
    
    <footer>
        <p>⚠️ For downloading your own content or content with permission.</p>
        <p>📧 Support: snapload@support.com | <a href="/privacy">Privacy Policy</a></p>
    </footer>
</div>

<script>
let currentUser = null;

async function checkAuth() {
    try {
        const res = await fetch('/api/me', {
            credentials: 'include'
        });
        if (res.ok) {
            const data = await res.json();
            currentUser = data.user;
            showLoggedInUI(data.user, data.credits);
        } else {
            showLoggedOutUI();
        }
    } catch(e) {
        showLoggedOutUI();
    }
}

function showLoggedInUI(user, credits) {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('downloadSection').style.display = 'block';
    document.getElementById('userInfo').classList.add('show');
    document.getElementById('userName').textContent = user.full_name || user.email.split('@')[0];
    document.getElementById('userCredits').textContent = credits;
    loadPricing();
}

function showLoggedOutUI() {
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('downloadSection').style.display = 'none';
    document.getElementById('userInfo').classList.remove('show');
}

function showAuthTab(tab) {
    if (tab === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('signupForm').classList.remove('active');
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('signupTabBtn').classList.remove('active');
    } else {
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('signupTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
    }
}

async function signup() {
    const full_name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    
    if (!email || !password) {
        showStatus('Please fill all fields', 'error');
        return;
    }
    
    showStatus('Creating account...', 'loading');
    
    const res = await fetch('/api/signup', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password, full_name})
    });
    
    if (res.ok) {
        const data = await res.json();
        document.cookie = `session_token=${data.session_token}; path=/; max-age=2592000`;
        currentUser = data.user;
        showStatus('Account created
