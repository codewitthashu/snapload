<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapLoad - Instagram & YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .url-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .options-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .options-row select {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }
        
        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Popup Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            padding: 30px;
            position: relative;
        }
        
        .modal-content h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        
        .modal-content button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .modal-content .close-modal {
            background: #6c757d;
            margin-top: 5px;
        }
        
        .otp-section {
            display: none;
        }
        
        .otp-section.show {
            display: block;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .preview {
            margin-top: 20px;
            display: none;
        }
        
        .preview.show {
            display: block;
        }
        
        .preview img {
            max-width: 100%;
            border-radius: 12px;
        }
        
        .download-link {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        
        .download-link.show {
            display: block;
        }
        
        .download-link a {
            display: inline-block;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .user-bar .credits {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .user-bar .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📥 SnapLoad</h1>
        <p class="subtitle">Download Instagram Reels & YouTube Videos</p>
        
        <!-- User Bar (shown after login) -->
        <div id="userBar" class="user-bar hidden">
            <span>👋 <span id="userEmail"></span></span>
            <span class="credits">🎫 <span id="userCredits">0</span> credits</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <!-- Main Download Section -->
        <input type="text" id="urlInput" class="url-input" placeholder="Paste Instagram Reel or YouTube URL here...">
        
        <div class="options-row">
            <select id="formatSelect">
                <option value="mp4">📹 MP4 (Video)</option>
                <option value="mp3">🎵 MP3 (Audio)</option>
            </select>
            <select id="qualitySelect">
                <option value="best">Best Quality</option>
                <option value="720">720p</option>
                <option value="480">480p</option>
                <option value="360">360p</option>
            </select>
        </div>
        
        <button class="download-btn" onclick="handleDownload()">⬇ Download Now</button>
        
        <div class="status" id="status"></div>
        <div class="preview" id="preview">
            <img id="previewThumb" src="">
            <h4 id="previewTitle"></h4>
        </div>
        <div class="download-link" id="downloadLink">
            <a href="#" id="downloadAnchor" download>💾 Save File</a>
        </div>
    </div>
    
    <footer>
        <p>⚠️ For downloading your own content or content with permission.</p>
        <p><a href="/privacy" style="color:white;">Privacy</a> | <a href="/terms" style="color:white;">Terms</a> | <a href="/refund" style="color:white;">Refund</a></p>
    </footer>
</div>

<!-- Login/Signup Popup Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">🔐 Login or Sign Up</h2>
        
        <div id="loginSection">
            <input type="email" id="modalEmail" placeholder="Email address">
            <button onclick="sendOTP()">Continue with Email</button>
        </div>
        
        <div id="otpSection" class="otp-section">
            <input type="text" id="modalOTP" placeholder="Enter OTP">
            <button onclick="verifyOTP()">Verify & Download</button>
            <button class="close-modal" onclick="closeModal()">Cancel</button>
            <p style="font-size: 12px; text-align: center; margin-top: 10px;">
                OTP sent to <span id="otpEmail"></span>
            </p>
        </div>
    </div>
</div>

<script>
let pendingUrl = null;
let pendingFormat = null;
let pendingQuality = null;
let pendingEmail = null;
let sessionToken = null;
let currentCredits = 0;

// Check if user is already logged in
async function checkAuth() {
    try {
        const res = await fetch('/api/me', { credentials: 'include' });
        if (res.ok) {
            const data = await res.json();
            sessionToken = document.cookie.split('session_token=')[1]?.split(';')[0];
            currentCredits = data.credits;
            document.getElementById('userBar').classList.remove('hidden');
            document.getElementById('userEmail').textContent = data.user.email.split('@')[0];
            document.getElementById('userCredits').textContent = currentCredits;
            return true;
        }
    } catch(e) {}
    return false;
}

// Handle download button click
async function handleDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
        showStatus('Please paste a URL', 'error');
        return;
    }
    
    pendingUrl = url;
    pendingFormat = document.getElementById('formatSelect').value;
    pendingQuality = document.getElementById('qualitySelect').value;
    
    // Check if user is logged in
    const isLoggedIn = await checkAuth();
    
    if (isLoggedIn) {
        // Already logged in, proceed with download
        startDownload();
    } else {
        // Show login/signup popup
        showModal();
    }
}

// Show modal
function showModal() {
    document.getElementById('modalTitle').innerText = '🔐 Login or Sign Up';
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('otpSection').classList.remove('show');
    document.getElementById('modalEmail').value = '';
    document.getElementById('modalOTP').value = '';
    document.getElementById('authModal').classList.add('show');
}

// Close modal
function closeModal() {
    document.getElementById('authModal').classList.remove('show');
}

// Send OTP to email
async function sendOTP() {
    const email = document.getElementById('modalEmail').value.trim();
    if (!email) {
        alert('Please enter your email');
        return;
    }
    
    showModalStatus('Sending OTP...', 'loading');
    
    const res = await fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    });
    
    if (res.ok) {
        pendingEmail = email;
        document.getElementById('otpEmail').innerText = email;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('otpSection').classList.add('show');
        document.getElementById('modalTitle').innerText = '📧 Enter OTP';
        showModalStatus('OTP sent to your email!', 'success');
    } else {
        const error = await res.json();
        showModalStatus(error.detail || 'Failed to send OTP', 'error');
    }
}

// Verify OTP and login/signup
async function verifyOTP() {
    const otp = document.getElementById('modalOTP').value.trim();
    if (!otp) {
        alert('Please enter OTP');
        return;
    }
    
    showModalStatus('Verifying...', 'loading');
    
    const res = await fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingEmail, otp: otp })
    });
    
    if (res.ok) {
        const data = await res.json();
        // Set cookie from response
        if (data.session_token) {
            document.cookie = `session_token=${data.session_token}; path=/; max-age=2592000`;
        }
        closeModal();
        showStatus('Login successful! Starting download...', 'success');
        await checkAuth();
        startDownload();
    } else {
        const error = await res.json();
        showModalStatus(error.detail || 'Invalid OTP', 'error');
    }
}

// Start the actual download
async function startDownload() {
    if (!pendingUrl) return;
    
    showStatus('Getting video info...', 'loading');
    
    try {
        // Get video info
        const infoRes = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                url: pendingUrl,
                format: pendingFormat,
                quality: pendingQuality
            })
        });
        
        if (!infoRes.ok) {
            const err = await infoRes.json();
            throw new Error(err.detail);
        }
        
        const info = await infoRes.json();
        
        // Show preview
        document.getElementById('previewThumb').src = info.thumbnail;
        document.getElementById('previewTitle').textContent = info.title;
        document.getElementById('preview').classList.add('show');
        
        showStatus('Downloading... (1 credit will be used)', 'loading');
        
        // Download
        const dlRes = await fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                url: pendingUrl,
                format: pendingFormat,
                quality: pendingQuality
            })
        });
        
        if (!dlRes.ok) {
            const err = await dlRes.json();
            if (dlRes.status === 402) {
                throw new Error('No credits left! Please purchase more.');
            }
            throw new Error(err.detail);
        }
        
        const result = await dlRes.json();
        
        // Update credits display
        currentCredits = result.credits_remaining;
        document.getElementById('userCredits').textContent = currentCredits;
        
        // Show download link
        document.getElementById('downloadAnchor').href = result.download_url;
        document.getElementById('downloadLink').classList.add('show');
        
        showStatus(result.message, 'success');
        
        // Reset pending
        pendingUrl = null;
        
    } catch (error) {
        showStatus(error.message, 'error');
    }
}

// Show status message
function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = `status show ${type}`;
    setTimeout(() => {
        statusDiv.classList.remove('show');
    }, 5000);
}

function showModalStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = `status show ${type}`;
}

// Logout function
async function logout() {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    document.cookie = 'session_token=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
    document.getElementById('userBar').classList.add('hidden');
    currentCredits = 0;
    showStatus('Logged out successfully', 'success');
}

// Check auth on page load
checkAuth();
</script>
</body>
</html>
